  /gateway/{gatewayId}/device/{deviceId}/ia/conso/{period}/{date}:
    get:
      tags: [Insights (IA)]
      summary: Get AI consumption breakdown by usage
      operationId: getIaConso
      description: |
        AI-estimated consumption split by usage category (water heating, large
        appliances, standby, fridges, cooking, …) for a period. Some categories carry
        nested `usage_childrens`. `evol_status` encodes the trend vs. the previous
        period.

        The trailing `/{date}` is optional: omit it (e.g. `.../ia/conso/w`) to get the
        most recent period.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularity. Observed values for **ia/conso**: `w` (week), `m` (month).
            See the period reference for meanings.
          schema:
            type: string
            enum: [w, m]
          example: w
        - name: date
          in: path
          required: true
          description: |
            Period start date (`YYYY-MM-DD`). Optional in practice — the app also calls
            `.../ia/conso/{period}` without a date to fetch the current period.
          schema: { type: string }
          example: "2026-06-15"
      responses:
        "200":
          description: Usage breakdown.
          content:
            application/json:
              example:
                stat:
                  period:
                    this: 1632079200000
                    prev: 1631474400000
                    measure_unit: EUR
                    price: 15.00
                    kwh: 60.0
                  data:
                    - kwh: 24.0
                      price: 6.00
                      percentage: 40
                      category: { id: 3, name: Eau chaude, color: "#ff712b" }
                      evol_status: 1
                    - kwh: 12.0
                      price: 3.00
                      percentage: 20
                      category: { id: 5, name: Gros électroménager, color: "#05a1fb" }
                      is_beta: true
                      usage_childrens:
                        - kwh: 3.0
                          price: 0.75
                          percentage: 5
                          category: { id: 12, name: Lave-vaisselle, color: "#05a1fb", image_link: "https://service.ecojoko.com/img/placeholder.webp" }
                        - kwh: 9.0
                          price: 2.25
                          percentage: 15
                          category: { id: 13, name: Lavage du linge, color: "#05a1fb", image_link: "https://service.ecojoko.com/img/placeholder.webp" }
                      evol_status: 1
                    - kwh: 9.0
                      price: 2.25
                      percentage: 15
                      category: { id: 6, name: "Frigos, Congélateurs", color: "#01d7fe" }
                      evol_status: 2
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/ia/appliances/{start}/{end}:
    get:
      tags: [Insights (IA)]
      summary: List detected appliance runs
      operationId: getIaAppliances
      description: |
        Individual appliance activation events detected by the AI over a time window.
        Each entry has a start/end timestamp, peak `power` (W), energy (`kwh`) and a
        `picto` used for rendering. Pass `0/0` to use the default window. Array
        truncated below.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: start
          in: path
          required: true
          description: Window start (epoch seconds), or `0` for the default window.
          schema: { type: integer }
          example: 0
        - name: end
          in: path
          required: true
          description: Window end (epoch seconds), or `0` for the default window.
          schema: { type: integer }
          example: 0
      responses:
        "200":
          description: Detected appliance runs.
          content:
            application/json:
              example:
                error_id: 0
                appliances:
                  - { id: 1550000000, start_date: 1550000000000, end_date: 1550000600000, power: 2000, kwh: 0.30, picto: { w: 14, h: 34, color: "#F7B500" } }
                  - { id: 1550010000, start_date: 1550010000000, end_date: 1550017000000, power: 2000, kwh: 4.50, picto: { w: 96, h: 32, color: "#FA6200" } }
                  - { id: 1550020000, start_date: 1550020000000, end_date: 1550020200000, power: 500, kwh: 0.02, picto: { w: 5, h: 8, color: "#5FC2FF" } }
                is_pending: 0
                start_time: 1549996400
                stop_time: 1550100000
        "401":
