  /gateway/{gatewayId}/message/{messageId}:
    put:
      tags: [Messages & Notifications]
      summary: Mark a message as read
      operationId: markMessageRead
      description: Updates a single message's read state. Sent as a small form/JSON body.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - name: messageId
          in: path
          required: true
          description: The `message_id` of the message to update.
          schema: { type: integer }
          example: 11111111
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_read:
                  type: integer
                  description: "`1` to mark read, `0` to mark unread."
            example: { is_read: 1 }
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                is_read: { type: integer }
      responses:
        "200":
          description: Update result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example: { error_id: 0, error_desc: "" }
        "401":
          $ref: "#/components/responses/Unauthorized"

