      operationId: getMessages
      description: |
        Paginated feed of in-app messages (savings alerts, records, temperature tips,
        …). `{offset}` is the pagination cursor (`0` for the first page); `is_next`
        indicates whether more pages exist. Each item's `message_id` is used to mark it
        read via `PUT /gateway/{gatewayId}/message/{messageId}`.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - name: offset
          in: path
