  /gateway/{gatewayId}/device/{deviceId}/tempstat/{period}/{date}:
    get:
      tags: [Devices – Temp/Humidity]
      summary: Get temperature statistics time-series
      operationId: getTempStat
      description: |
        Indoor temperature (`value`, °C) and outdoor temperature (`ext_value`)
        time-series for the given `{period}` starting at `{date}`. Data array
        truncated below.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularity for **tempstat**: `h` (hour), `d4` (day), `w` (week),
            `m` (month), `y` (year). See the period reference for meanings.
          schema:
            type: string
            enum: [h, d4, w, m, y]
          example: d4
        - { $ref: "#/components/parameters/StatDate" }
      responses:
        "200":
          description: Temperature statistics.
          content:
            application/json:
              example:
                stat:
                  data:
                    - { time: 1632943200000, value: 20.0, ext_value: 15.0 }
                    - { time: 1632943320000, value: 20.0, ext_value: 15.0 }
                    - { time: 1632991020000, value: 20.0, ext_value: 15.0 }
                  period:
                    this: 1632943200000
                    prev: 1632856800000
                    measure_unit: "°C"
                    kwh_hp_ns: 0
                    kwh_hc_ns: 0
                  axis: { y: { max: 27, min: 10 } }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/humstat/{period}/{date}:
    get:
