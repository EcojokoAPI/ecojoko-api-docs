                      - { id: 90, title: "Fortes chaleurs: quand ouvrir les fenêtres", value: 0 }
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: LKSA
      description: |
        Session cookie obtained from `POST /login`. The live session also relies on the
        companion `tdw` cookie set at the same time — send **both** cookies on each
        request.

  parameters:
    GatewayId:
      name: gatewayId
      in: path
      required: true
      description: The gateway id (see `GET /gateways`).
      schema: { type: integer }
      example: 12345
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: The device id of a device bound to the gateway (see `GET /gateways`).
      schema: { type: integer }
      example: 67891
    StatDate:
      name: date
      in: path
      required: true
      description: |
        Anchor date for the requested period, `YYYY-MM-DD`. In some captures a time is
        appended with no separator, i.e. `YYYY-MM-DDHH:MM` (e.g. `2026-07-0113:25`).
      schema: { type: string }
      example: "2026-07-02"

  schemas:
    ErrorEnvelope:
      type: object
      description: Common result envelope returned by write/action endpoints.
      properties:
        error_id:
          type: integer
          description: "`0` on success; non-zero on error."
        error_desc:
          type: string
          description: Human-readable message (often localized in French).

  responses:
    Unauthorized:
      description: |
        Missing or expired session. Call `POST /login` again to obtain fresh
        `LKSA` / `tdw` cookies. (Shape observed from the app; exact status/body may vary.)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example: { error_id: 1, error_desc: "Not connected." }
