        time-series for the given `{period}` starting at `{date}`. Data array
        truncated below.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularity for **humstat**: `h` (hour), `d4` (day), `w` (week),
            `m` (month), `y` (year). See the period reference for meanings.
          schema:
            type: string
            enum: [h, d4, w, m, y]
          example: d4
        - { $ref: "#/components/parameters/StatDate" }
      responses:
        "200":
          description: Humidity statistics.
          content:
            application/json:
              example:
                stat:
                  data:
                    - { time: 1632943200000, value: 50, ext_value: 60.0 }
                    - { time: 1632943320000, value: 50, ext_value: 60.0 }
                    - { time: 1632944400000, value: 50, ext_value: 60.0 }
                  period:
                    this: 1632943200000
                    prev: 1632856800000
                    measure_unit: "%"
                    kwh_hp_ns: 0
