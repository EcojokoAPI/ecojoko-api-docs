                      - { id: 90, title: "Fortes chaleurs: quand ouvrir les fenêtres", value: 0 }
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: LKSA
      description: |
        Cookie de session obtenu via `POST /login`. La session réelle repose aussi sur le
        cookie compagnon `tdw` déposé au même moment — renvoyez **les deux** cookies à chaque
        requête.

  parameters:
    GatewayId:
      name: gatewayId
      in: path
      required: true
      description: L'identifiant de la passerelle (voir `GET /gateways`).
      schema: { type: integer }
      example: 12345
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: L'identifiant d'un appareil associé à la passerelle (voir `GET /gateways`).
      schema: { type: integer }
      example: 67891
    StatDate:
      name: date
      in: path
      required: true
      description: |
        Date d'ancrage de la période demandée, `AAAA-MM-JJ`. Dans certaines captures, une
        heure est ajoutée sans séparateur, c.-à-d. `AAAA-MM-JJHH:MM` (p. ex. `2026-07-0113:25`).
      schema: { type: string }
      example: "2026-07-02"

  schemas:
    ErrorEnvelope:
      type: object
      description: Enveloppe de résultat commune renvoyée par les points d'accès d'écriture/action.
      properties:
        error_id:
          type: integer
          description: "`0` en cas de succès ; non nul en cas d'erreur."
        error_desc:
          type: string
          description: Message lisible (souvent localisé en français).

  responses:
    Unauthorized:
      description: |
        Session absente ou expirée. Rappelez `POST /login` pour obtenir de nouveaux cookies
        `LKSA` / `tdw`. (Forme observée depuis l'application ; le statut/corps exact peut
        varier.)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example: { error_id: 1, error_desc: "Not connected." }
