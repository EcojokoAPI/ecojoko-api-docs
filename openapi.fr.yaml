  /gateway/{gatewayId}/housing_profile:
    get:
      tags: [Savings & Housing]
      summary: Obtenir le profil du logement
      operationId: getHousingProfile
      description: Caractéristiques du foyer (surface, occupants, chauffage et appareils) utilisées pour les estimations d'économies.
      parameters: [{ $ref: "#/components/parameters/GatewayId" }]
      responses:
        "200":
          description: Profil du logement.
          content:
            application/json:
              example:
                nb_people: 3
                house_type: 2
                house_surface: 100
                is_primary_house: 1
                energy_category: 3
                energy_profile:
                  heating_type: 2
                  primary_heating: 2
                  heating:
                    electric_heater: 3
                    heat_pump: 1
                    air_conditioner: 1
                    other_heater: 0
                    other_heating: 0
                    wood: 0
                    gaz: 1
                    fioul: 0
                    electric_radiator: 2
                    air_air_heat_pump: 1
                    air_water_heat_pump: 0
                    electric_floor_heating: 1
                  boiler_type: 2
                  energy_device:
                    pool: 1
                    electric_car: 1
                    jacuzzi: 0
                    dishwasher: 0
                    tumbledryer: 0
                    washerdryer: 0
                    combo_washer_dryer: 1
                    other: 0
                    fridge: 1
                    cooking_hob_type: 1
                    electric_car_charger_type: 1
                    water_heater_resistance: 0
                    water_heater_thermodynamic: 1
                    water_heater_instant: 0
                    water_heater_heat_pump: 0
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/statements:
    get:
      tags: [Savings & Housing]
      summary: Lister les relevés de facturation
      operationId: getStatements
      parameters: [{ $ref: "#/components/parameters/GatewayId" }]
      responses:
        "200":
          description: Relevés de facturation (peut être vide).
          content:
            application/json:
              example:
                statements: []
                is_three_phased: 0
                is_terminated: 1
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/savings/{period}/{count}:
    get:
      tags: [Savings & Housing]
      summary: Obtenir l'estimation d'économies
      operationId: getSavings
      description: |
        Économies estimées par rapport au profil initial et à la référence « best », sur les
        `{count}` dernières unités de `{period}` (p. ex. `m/12` = 12 derniers mois).
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - name: period
          in: path
          required: true
          description: |
            Granularité d'agrégation. Valeur observée pour **savings** : `m` (mois).
            Voir la référence des périodes pour la signification.
          schema:
            type: string
            enum: [m]
          example: m
        - name: count
          in: path
          required: true
          description: Nombre de périodes à agréger (p. ex. `12`).
          schema: { type: integer }
          example: 12
      responses:
        "200":
          description: Détail des économies.
          content:
            application/json:
              example:
                savings:
                  conso: 1200.00
                  profil_initial: 1250.00
                  best: 1240.00
                  home: 1100
                  unit: EUR
                  measurements_str: Chauffage, Eau chaude
                  measurements: [1, 1]
                  kwh: 6000.00
                  need_house_info: 0
                  access: { conso: 1, savings: 1 }
                  week_reference: 1
                  profil_initial_kwh: 6200.00
                  kwh_with_ref: 6100.00
                  savings:
                    me: { level: 5, data: 40.00 }
                    best: { level: 1, data: -40.00 }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/realtime_conso:
    get:
      tags: [Devices – Power]
      summary: Obtenir la consommation en temps réel
      operationId: getRealtimeConso
      description: Puissance active instantanée (W), puissance apparente (VA) et angle du facteur de puissance.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
      responses:
        "200":
          description: Relevé en temps réel.
          content:
            application/json:
              example:
                real_time:
                  watt: "200 W"
                  value: 200
                  va: "300 VA"
                  value2: 300
                  degree: -30.0
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/powertrend:
    get:
      tags: [Devices – Power]
      summary: Obtenir la tendance de puissance à court terme
      operationId: getPowerTrend
      description: |
        Une courte fenêtre glissante d'échantillons de puissance haute résolution (`value` en
        watts, `price` en devise) avec les totaux agrégés dans `period`. Le tableau
        d'échantillons est tronqué dans l'exemple ci-dessous.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
      responses:
        "200":
          description: Fenêtre de tendance de puissance.
          content:
            application/json:
              example:
                stat:
                  data:
                    - { time: 1632990911000, value: 250, price: 1.9e-5 }
                    - { time: 1632990916000, value: 250, price: 7.6e-6 }
                    - { time: 1632990918000, value: 250, price: 1.9e-5 }
                  period:
                    this: 1632990911000
                    prev: 1632990811000
                    next: 1632991011000
                    measure_unit: W
                    kwh_hp_ns: 0.003
                    kwh_hc_ns: 0
                    price: 0.0002
                    price_prod: 0
                    kwh: 0.003
                    kwh_prod: 0
                    raw_watt: 250
                  axis: { y: { max: 300 } }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/powerstat/{period}/{date}:
    get:
      tags: [Devices – Power]
      summary: Obtenir la série temporelle de statistiques de puissance
      operationId: getPowerStat
      description: |
        Série temporelle de consommation de puissance pour la `{period}` donnée à partir de
        `{date}`.

        **La forme de `stat.data[]` dépend de la période :**

        - **Périodes intra-journalières (p. ex. `d4`)** : un point par horodatage, chacun
          avec la `value` de puissance mesurée (W), la ligne de base de veille (`consobase`),
          le coût (`price`) et — pour les tarifs HP/HC — le palier `pricing` applicable.
        - **Périodes agrégées (p. ex. `w`)** : un point par sous-intervalle (par jour de la
          semaine pour `w`), chacun avec un total d'énergie `kwh`, un `kwh_prod` optionnel
          (surplus de production, en cas de production) et une ventilation `subconsumption[]`
          par plage tarifaire (`Heures Creuses`/`Heures Pleines`, ou les plages Tempo
          `HC Bleu`, `HP Bleu`, `HC Blanc`, `HP Blanc`, `HC Rouge`, `HP Rouge`).

        L'objet `period` en fin contient les totaux agrégés et `pricing_details` associe les
        identifiants de tarification à des libellés. Les tableaux de données sont tronqués
        dans les exemples ci-dessous.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularité. Valeurs observées pour **powerstat** : `h` (heure), `d4` (jour),
            `w` (semaine), `m6` (mois), `y` (année). Voir la référence des périodes.
          schema:
            type: string
            enum: [h, d4, w, m6, y]
          example: d4
        - { $ref: "#/components/parameters/StatDate" }
      responses:
        "200":
          description: Statistiques de puissance.
          content:
            application/json:
              examples:
                dayResolution:
                  summary: Intra-journalier (d4) — watts par horodatage
                  description: Réponse `powerstat/d4` capturée (tableau de données tronqué).
                  value:
                    stat:
                      data:
                        - { time: 1632943200000, consobase: 60, value: 2000, price: 0.0025, cp: 0.0005, is_hchp: 1, pricing: 3 }
                        - { time: 1632943440000, consobase: 60, value: 2000, price: 0.0025, cp: 0.0005, is_hchp: 1, pricing: 3 }
                        - { time: 1632991020000, consobase: 60, value: 400, price: 0.0009, cp: 0.00003, pricing: 2 }
                      period:
                        this: 1632943200000
                        prev: 1632856800000
                        measure_unit: W
                        veille_price: 0.10
                        veille_watt: 60
                        kwh_hp_ns: 1.5
                        kwh_hc_ns: 4.5
                        missing_data: 0
                        price: 1.20
                        price_prod: 0
                        kwh: 6.0
                        kwh_prod: 0
                        raw_watt: 500
                      pricing_details:
                        - { color: "#7ED2DF", id: 2, label: Heures Pleines }
                        - { color: "#679AA2", id: 3, label: Heures Creuses }
                      axis: { y: { max: 7000 } }
                weekWithSubconsumption:
                  summary: Hebdomadaire (w) — kWh par jour avec ventilation tarifaire (déduit)
                  description: |
                    **Déduit, non capturé.** Illustre la forme des périodes agrégées (une
                    entrée par jour de la semaine) telle qu'exploitée par l'intégration Home
                    Assistant communautaire `little_monkey`. Les champs montrés (`kwh`,
                    `kwh_prod` et `subconsumption[].label`/`.kwh`) sont ceux que cette
                    intégration lit ; d'autres champs et valeurs peuvent différer. La première
                    ligne correspond à un compteur HC/HP, la seconde à un compteur Tempo.
                  value:
                    stat:
                      data:
                        - time: 1632388800000
                          kwh: 12.0
                          kwh_prod: 0
                          subconsumption:
                            - { label: Heures Creuses, kwh: 7.0 }
                            - { label: Heures Pleines, kwh: 5.0 }
                        - time: 1632475200000
                          kwh: 10.0
                          kwh_prod: 1.0
                          subconsumption:
                            - { label: HC Bleu, kwh: 4.0 }
                            - { label: HP Bleu, kwh: 3.0 }
                            - { label: HC Blanc, kwh: 2.0 }
                            - { label: HP Blanc, kwh: 1.0 }
                            - { label: HC Rouge, kwh: 0 }
                            - { label: HP Rouge, kwh: 0 }
                      period:
                        this: 1632388800000
                        prev: 1631784000000
                        measure_unit: W
                        kwh: 60.0
                        kwh_prod: 2.0
                      axis: { y: { max: 7000 } }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/savingstat/{period}/{date}:
    get:
      tags: [Devices – Power]
      summary: Obtenir la série temporelle de statistiques d'économies
      operationId: getSavingStat
      description: |
        Série temporelle d'économies par période comparant la consommation réelle (`conso`) à
        la référence (`ref`), avec l'économie résultante (`val`) en devise et en kWh.
        `is_saving` indique si l'intervalle a réalisé une économie par rapport à la référence.
        L'objet `period` en fin contient les totaux agrégés. Tableau de données tronqué
        ci-dessous.

        À distinguer de `GET /gateway/{gatewayId}/savings/{period}/{count}`, qui renvoie un
        *résumé* d'économies agrégé plutôt qu'une série temporelle.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularité pour **savingstat** : `w` (semaine), `m` (mois), `y` (année).
            Voir la référence des périodes.
          schema:
            type: string
            enum: [w, m, y]
          example: w
        - { $ref: "#/components/parameters/StatDate" }
      responses:
        "200":
          description: Statistiques d'économies.
          content:
            application/json:
              example:
                stat:
                  period:
                    this: 1632684000000
                    prev: 1632079200000
                    measure_unit: EUR
                    veille_price: 1.00
                    veille_kwh: 4
                    missing_data: 0
                    ref: 7.00
                    ref_kwh: 30.0
                    val: 0.70
                    val_kwh: 2.5
                    is_saving: 1
                    price: 6.30
                    kwh: 27.5
                  data:
                    - { time: 1632684000000, conso: 2.00, val: 0.20, ref: 2.20, conso_kwh: 10.0, ref_kwh: 10.0, val_kwh: 0.10, is_saving: 1 }
                    - { time: 1632856800000, conso: 2.00, val: 0.30, ref: 2.30, conso_kwh: 8.0, ref_kwh: 10.0, val_kwh: 2.0, is_saving: 1 }
                    - { time: 1632943200000, conso: 0, val: 0, val_kwh: 0, ref: 0, conso_kwh: 0, ref_kwh: 0 }
                  pricing_details:
                    - { id: 2, label: Heures Pleines, color: "#0087B1", enable_filter: 1 }
                    - { id: 3, label: Heures Creuses, color: "#6BBED8", enable_filter: 1 }
                  axis: { y: { max: 5, min: -5 } }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/tempstat/{period}/{date}:
    get:
      tags: [Devices – Temp/Humidity]
      summary: Obtenir la série temporelle de statistiques de température
      operationId: getTempStat
      description: |
        Série temporelle de température intérieure (`value`, °C) et extérieure (`ext_value`)
        pour la `{period}` donnée à partir de `{date}`. Tableau de données tronqué ci-dessous.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularité pour **tempstat** : `h` (heure), `d4` (jour), `w` (semaine),
            `m` (mois), `y` (année). Voir la référence des périodes.
          schema:
            type: string
            enum: [h, d4, w, m, y]
          example: d4
        - { $ref: "#/components/parameters/StatDate" }
      responses:
        "200":
          description: Statistiques de température.
          content:
            application/json:
              example:
                stat:
                  data:
                    - { time: 1632943200000, value: 20.0, ext_value: 15.0 }
                    - { time: 1632943320000, value: 20.0, ext_value: 15.0 }
                    - { time: 1632991020000, value: 20.0, ext_value: 15.0 }
                  period:
                    this: 1632943200000
                    prev: 1632856800000
                    measure_unit: "°C"
                    kwh_hp_ns: 0
                    kwh_hc_ns: 0
                  axis: { y: { max: 27, min: 10 } }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/humstat/{period}/{date}:
    get:
      tags: [Devices – Temp/Humidity]
      summary: Obtenir la série temporelle de statistiques d'humidité
      operationId: getHumStat
      description: |
        Série temporelle d'humidité relative intérieure (`value`, %) et extérieure
        (`ext_value`) pour la `{period}` donnée à partir de `{date}`. Tableau de données
        tronqué ci-dessous.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularité pour **humstat** : `h` (heure), `d4` (jour), `w` (semaine),
            `m` (mois), `y` (année). Voir la référence des périodes.
          schema:
            type: string
            enum: [h, d4, w, m, y]
          example: d4
        - { $ref: "#/components/parameters/StatDate" }
      responses:
        "200":
          description: Statistiques d'humidité.
          content:
            application/json:
              example:
                stat:
                  data:
                    - { time: 1632943200000, value: 50, ext_value: 60.0 }
                    - { time: 1632943320000, value: 50, ext_value: 60.0 }
                    - { time: 1632944400000, value: 50, ext_value: 60.0 }
                  period:
                    this: 1632943200000
                    prev: 1632856800000
                    measure_unit: "%"
                    kwh_hp_ns: 0
                    kwh_hc_ns: 0
                  axis: { y: { max: 100, min: 0 } }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/ia/conso/{period}/{date}:
    get:
      tags: [Insights (IA)]
      summary: Obtenir la répartition de consommation par usage (IA)
      operationId: getIaConso
      description: |
        Consommation estimée par l'IA, répartie par catégorie d'usage (eau chaude, gros
        électroménager, veilles, réfrigérateurs, cuisson, …) pour une période. Certaines
        catégories contiennent des `usage_childrens` imbriqués. `evol_status` encode la
        tendance par rapport à la période précédente.

        Le `/{date}` final est optionnel : omettez-le (p. ex. `.../ia/conso/w`) pour obtenir
        la période la plus récente.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: period
          in: path
          required: true
          description: |
            Granularité. Valeurs observées pour **ia/conso** : `w` (semaine), `m` (mois).
            Voir la référence des périodes.
          schema:
            type: string
            enum: [w, m]
          example: w
        - name: date
          in: path
          required: true
          description: |
            Date de début de période (`AAAA-MM-JJ`). Optionnelle en pratique — l'application
            appelle aussi `.../ia/conso/{period}` sans date pour la période courante.
          schema: { type: string }
          example: "2026-06-15"
      responses:
        "200":
          description: Répartition par usage.
          content:
            application/json:
              example:
                stat:
                  period:
                    this: 1632079200000
                    prev: 1631474400000
                    measure_unit: EUR
                    price: 15.00
                    kwh: 60.0
                  data:
                    - kwh: 24.0
                      price: 6.00
                      percentage: 40
                      category: { id: 3, name: Eau chaude, color: "#ff712b" }
                      evol_status: 1
                    - kwh: 12.0
                      price: 3.00
                      percentage: 20
                      category: { id: 5, name: Gros électroménager, color: "#05a1fb" }
                      is_beta: true
                      usage_childrens:
                        - kwh: 3.0
                          price: 0.75
                          percentage: 5
                          category: { id: 12, name: Lave-vaisselle, color: "#05a1fb", image_link: "https://service.ecojoko.com/img/placeholder.webp" }
                        - kwh: 9.0
                          price: 2.25
                          percentage: 15
                          category: { id: 13, name: Lavage du linge, color: "#05a1fb", image_link: "https://service.ecojoko.com/img/placeholder.webp" }
                      evol_status: 1
                    - kwh: 9.0
                      price: 2.25
                      percentage: 15
                      category: { id: 6, name: "Frigos, Congélateurs", color: "#01d7fe" }
                      evol_status: 2
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device/{deviceId}/ia/appliances/{start}/{end}:
    get:
      tags: [Insights (IA)]
      summary: Lister les cycles d'appareils détectés
      operationId: getIaAppliances
      description: |
        Événements d'activation d'appareils individuels détectés par l'IA sur une fenêtre
        temporelle. Chaque entrée possède un horodatage de début/fin, la puissance de pointe
        `power` (W), l'énergie (`kwh`) et un `picto` utilisé pour l'affichage. Passez `0/0`
        pour utiliser la fenêtre par défaut. Tableau tronqué ci-dessous.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - { $ref: "#/components/parameters/DeviceId" }
        - name: start
          in: path
          required: true
          description: Début de fenêtre (secondes epoch), ou `0` pour la fenêtre par défaut.
          schema: { type: integer }
          example: 0
        - name: end
          in: path
          required: true
          description: Fin de fenêtre (secondes epoch), ou `0` pour la fenêtre par défaut.
          schema: { type: integer }
          example: 0
      responses:
        "200":
          description: Cycles d'appareils détectés.
          content:
            application/json:
              example:
                error_id: 0
                appliances:
                  - { id: 1550000000, start_date: 1550000000000, end_date: 1550000600000, power: 2000, kwh: 0.30, picto: { w: 14, h: 34, color: "#F7B500" } }
                  - { id: 1550010000, start_date: 1550010000000, end_date: 1550017000000, power: 2000, kwh: 4.50, picto: { w: 96, h: 32, color: "#FA6200" } }
                  - { id: 1550020000, start_date: 1550020000000, end_date: 1550020200000, power: 500, kwh: 0.02, picto: { w: 5, h: 8, color: "#5FC2FF" } }
                is_pending: 0
                start_time: 1549996400
                stop_time: 1550100000
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/device_types:
