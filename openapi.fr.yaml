  /gateway/{gatewayId}/messages/{offset}:
    get:
      tags: [Messages & Notifications]
      summary: Lister les messages in-app
      operationId: getMessages
      description: |
        Fil paginé des messages in-app (alertes d'économies, records, conseils de
        température, …). `{offset}` est le curseur de pagination (`0` pour la première page) ;
        `is_next` indique s'il existe d'autres pages. Le `message_id` de chaque élément sert à
        le marquer comme lu via `PUT /gateway/{gatewayId}/message/{messageId}`.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - name: offset
          in: path
          required: true
          description: Décalage de pagination (`0` = première page).
          schema: { type: integer }
          example: 0
      responses:
        "200":
          description: Page du fil de messages.
          content:
            application/json:
              example:
                is_next: 1
                messages:
                  - display: savings-detail
                    category: 2
                    happiness: 5
                    title: Vous économisez
                    desc: Consommation sur 7 jours en baisse de 10% par rapport à votre référence.
                    id: 18
                    category_detail_id: 106
                    date: "2026-01-01 00:00:00"
                    category_detail:
                      label: Sur les 7 derniers jours
                      image_link: https://service.ecojoko.com/img/placeholder.webp
                    read: 0
                    message_id: 11111111
                  - display: records
                    category: 1
                    happiness: 5
                    title: Nouveau niveau
                    desc: Niveau 1 banane de bronze atteint. Vous consommez moins d’énergie. Merci :o)
                    id: 9
                    category_detail_id: 102
                    date: "2026-01-02 00:00:00"
                    type: niv1
                    notification: { img: ecusson_niv1 }
                    category_detail:
                      label: Économies
                      image_link: https://service.ecojoko.com/img/placeholder.webp
                    read: 0
                    message_id: 11111112
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateway/{gatewayId}/message/{messageId}:
    put:
      tags: [Messages & Notifications]
      summary: Marquer un message comme lu
      operationId: markMessageRead
      description: Met à jour l'état « lu » d'un message. Envoyé comme petit corps form/JSON.
      parameters:
        - { $ref: "#/components/parameters/GatewayId" }
        - name: messageId
          in: path
          required: true
          description: Le `message_id` du message à mettre à jour.
          schema: { type: integer }
          example: 11111111
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_read:
                  type: integer
                  description: "`1` pour marquer comme lu, `0` pour non lu."
            example: { is_read: 1 }
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                is_read: { type: integer }
      responses:
        "200":
          description: Résultat de la mise à jour.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example: { error_id: 0, error_desc: "" }
        "401":
          $ref: "#/components/responses/Unauthorized"

