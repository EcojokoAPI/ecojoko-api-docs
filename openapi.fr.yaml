openapi: 3.1.0

info:
  title: API Ecojoko (non officielle)
  version: "1.0.19"
  summary: API HTTP de l'application mobile Ecojoko, documentée par la communauté.
  description: |
    Documentation non officielle, obtenue par rétro-ingénierie, de l'API HTTP privée que
    l'application mobile **Ecojoko** (`Ecojoko/1.0.19`) utilise pour dialoguer avec
    `https://service.ecojoko.com`.

    Elle permet de lire vos données de suivi énergétique : puissance en temps réel, séries
    temporelles de puissance / température / humidité, répartition de consommation par usage
    (IA), économies, missions, trophées, classement, messages et préférences de notification.

    ## ⚠️ Avertissement

    - Ceci est un projet **non officiel, réalisé par la communauté**. L'auteur n'est **en
      aucune façon affilié à, approuvé par, ou lié à Ecojoko / homesys**.
    - Il a été produit en observant le trafic de l'application officielle. L'API réelle peut
      **changer à tout moment sans préavis**, et cette documentation peut devenir inexacte
      ou cesser de fonctionner. **À utiliser à vos propres risques.**
    - Toutes les valeurs d'exemple de ce document sont **anonymisées** (identifiants, jetons,
      e-mails, adresses MAC, numéros de série de compteur, etc. fictifs).

    ## Authentification — à lire en premier

    Presque tous les points d'accès nécessitent une **session authentifiée**.
    L'authentification repose sur des **cookies** :

    1. Appelez `POST /login` avec l'e-mail de votre compte (`l`) et votre mot de passe (`p`).
       C'est le **seul** point d'accès qui ne requiert pas de session existante.
    2. La réponse dépose deux cookies via `Set-Cookie` :
       - **`LKSA`** — le jeton de session, envoyé comme **cookie de session**
         (sans `Expires`/`Max-Age` dans la réponse observée).
       - **`tdw`** — un jeton compagnon, envoyé avec un `Max-Age` de `2592000` secondes
         (≈30 jours) dans la réponse observée. C'est la durée de vie annoncée du cookie ;
         le serveur peut néanmoins invalider la session plus tôt.
    3. Renvoyez **les deux** cookies à chaque requête suivante via l'en-tête `Cookie`.
       Dès que la session n'est plus acceptée (ou après déconnexion), reconnectez-vous.

    Dans ce document, le schéma de sécurité modélise le cookie `LKSA` ; gardez à l'esprit que
    la session réelle repose aussi sur le cookie `tdw` renvoyé en même temps.

    ## Codes de période

    Les points d'accès de type série temporelle prennent un code de granularité `{period}`
    dans le chemin. Codes observés dans le trafic capturé :

    | Code | Signification |
    |------|---------------|
    | `h`  | Fenêtre horaire (haute résolution) |
    | `d4` | Jour |
    | `w`  | Semaine |
    | `m`  | Mois |
    | `m6` | Mois (la vue « mois » ; utilisée par `powerstat`) |
    | `y`  | Année |

    **Tous les points d'accès n'acceptent pas tous les codes.** Les codes documentés par
    point d'accès sont : `powerstat` → `h, d4, w, m6, y` ; `savingstat` → `w, m, y` ;
    `tempstat` → `h, d4, w, m, y` ; `humstat` → `h, d4, w, m, y` ; `ia/conso` → `w, m` ;
    `savings` → `m`. Ils proviennent du trafic capturé ; d'autres combinaisons peuvent
    fonctionner ou non.

  contact:
    name: Ecojoko (site officiel)
    url: https://www.ecojoko.com
  license:
    name: CC BY-NC 4.0
    url: https://creativecommons.org/licenses/by-nc/4.0/

servers:
  - url: https://service.ecojoko.com
    description: Service de production

tags:
  - name: Auth
    description: Création de session. Le seul point d'accès non authentifié.
  - name: User
    description: Informations au niveau du compte et résumé d'activité inter-passerelles.
  - name: Gateways
    description: Passerelles (l'assistant Ecojoko) et leurs appareils associés.
  - name: Devices – Power
    description: Données du compteur électrique (Linky / ERL) — temps réel, statistiques et tendances.
  - name: Devices – Temp/Humidity
    description: Séries temporelles de la sonde de température et d'humidité.
  - name: Insights (IA)
    description: Répartition de consommation par usage (IA) et détection des cycles d'appareils.
  - name: Savings & Housing
    description: Estimations d'économies, installation, profil du logement et relevés de facturation.
  - name: Gamification
    description: Missions, trophées/récompenses et classement de voisinage.
  - name: Messages & Notifications
    description: Fil des messages in-app et préférences du centre de notifications.

# Chaque opération requiert le cookie de session, sauf /login qui surcharge ce comportement.
security:
  - sessionCookie: []

paths:
  /login:
    post:
      tags: [Auth]
      summary: Se connecter et créer une session
      operationId: login
      description: |
        Authentifie avec e-mail + mot de passe et démarre une session.

        En cas de succès, le serveur renvoie deux en-têtes `Set-Cookie` — **`LKSA`** (jeton
        de session) et **`tdw`** — à renvoyer sur toutes les requêtes suivantes.

        > Remarque : bien que la requête soit envoyée avec
        > `Content-Type: application/x-www-form-urlencoded`, l'application transmet un petit
        > objet JSON comme corps. Les deux formes sont montrées ci-dessous.
      security: []          # point d'accès public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [l, p]
              properties:
                l:
                  type: string
                  description: Identifiant du compte (adresse e-mail).
                p:
                  type: string
                  description: Mot de passe du compte.
            example:
              l: user@example.com
              p: your-password
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [l, p]
              properties:
                l: { type: string }
                p: { type: string }
      responses:
        "200":
          description: |
            Résultat de la connexion. `error_id` vaut `0` en cas de succès. Les cookies de
            session sont fournis dans les en-têtes de réponse `Set-Cookie`.
          headers:
            Set-Cookie:
              description: |
                Dépose le cookie de session `LKSA` **et** (dans un second en-tête
                `Set-Cookie`) le cookie `tdw`. Renvoyez les deux sur les requêtes suivantes.
              schema:
                type: string
              example: "LKSA=SESSION_TOKEN_PLACEHOLDER; path=/; domain=ecojoko.com; secure"
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferred_lang: { type: string }
                  user_level: { type: string }
                  x_login:
                    type: string
                    description: Identifiant de messagerie interne (backend temps réel de type XMPP).
                  x_server:
                    type: string
                    description: Hôte/port du backend temps réel.
                  error_id: { type: integer }
                  error_desc: { type: string }
              example:
                preferred_lang: ""
                user_level: "0"
                x_login: "0000000000@homesys"
                x_server: "service.ecojoko.com:5223"
                error_id: 0
                error_desc: "Vous êtes connecté."
        "401":
          description: Identifiants invalides. `error_id` est non nul.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
              example: { error_id: 1, error_desc: "Identifiants incorrects." }

  /user:
    get:
      tags: [User]
      summary: Obtenir le compte utilisateur courant
      operationId: getUser
      description: Profil du compte, état de l'abonnement et type de passerelle attendu.
      responses:
        "200":
          description: Le compte de l'utilisateur authentifié.
          content:
            application/json:
              example:
                login: user@example.com
                insert_time: "2020-01-01 00:00:00"
                house_name: My Home
                color: "#5ed7c0"
                operator: example_operator
                subscription:
                  is_active: 1
                  is_free: 0
                  step: 1
                  is_insider: 0
                is_ref_insider: true
                expected_gateway_type: MURPHY2
                is_erl_insider: true
                is_erl: true
                co2_emis: 50.0
        "401":
          $ref: "#/components/responses/Unauthorized"

  /user/activity:
    get:
      tags: [User]
      summary: Obtenir le résumé d'activité inter-passerelles
      operationId: getUserActivity
      description: |
        Résumé du tableau de bord : économies et consommation sur 7 jours, consommation
        totale, position au classement, émissions de CO₂, signal Ecowatt et records de
        puissance de pointe.
      responses:
        "200":
          description: Résumé d'activité.
          content:
            application/json:
              example:
                activity:
                  savings_7j: { value: -10, degree: 200.0, ref_kwh: 50.0 }
                  conso_7j:
                    value: 10.00
                    kwh: 50.0
                    kwh_with_ref: 50.0
                    unit: EUR
                    unit_str: "€"
                    conso_unit_str: kWh
                    data: [300, 300, 300, 300, 300, 300, 300]
                  conso_all: { value: 30.00, unit: EUR, unit_str: "€" }
                  classement: 1
                  co2_emis: 50.0
                  week_reference: 1
                  max_power:
                    month: 5000
                    year: 8000
                    alltime: 8000
                    injection_month: 0
                    injection_year: 0
                    injection_alltime: 0
                    unit_str: W
                  ecowatt_signal: "#c4fbdb"
                  ecowatt_signal_val: 0
                  max_injection: 4000
                  max_consumption: 8000
        "401":
          $ref: "#/components/responses/Unauthorized"

  /gateways:
    get:
      tags: [Gateways]
      summary: Lister les passerelles et leurs appareils
      operationId: listGateways
      description: |
        Renvoie toutes les passerelles du compte avec leur état réseau, leurs réglages et la
        liste des appareils associés (compteurs de puissance, sondes température/humidité, …).
        Chaque appareil annonce les `device_commands` qu'il prend en charge — elles
        correspondent aux points d'accès de statistiques documentés sous les chemins des
        appareils.
      responses:
        "200":
          description: Passerelles avec leurs appareils imbriqués.
          content:
            application/json:
              example:
                gateways:
                  - gateway_id: 12345
                    gateway_type: MURPHY2
                    network:
                      ethernet: { state: 0, mac: "XX:XX:XX:XX:XX:73" }
                      wifi:
                        state: 1
                        ssid: MyWiFi
                        signal: 50
                        channel: 1
                        mac: "XX:XX:XX:XX:XX:70"
                    ap_ssid: "Monky2 XXXX"
                    ap_ble: "XX:XX:XX:XX:XX:72"
                    gateway_firmware_version: "1.01.02"
                    gateway_firmware_upgrade_needed: 0
                    gateway_settings:
