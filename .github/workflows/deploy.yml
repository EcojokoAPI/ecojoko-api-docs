name: Deploy API docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment. Do NOT cancel an in-progress run: cancelling
# after the artifact upload leaves an orphaned "github-pages" artifact, which makes
# actions/deploy-pages fail with "Multiple artifacts named github-pages ... count is 2".
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build the artifact in its own job so exactly one upload happens per run.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root: index.html loads openapi.yaml alongside it.
          path: .

  # Deploy the single artifact produced by the build job.
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
